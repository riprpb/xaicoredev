name: Quality Gates

on:
  pull_request:
  push:
    branches: [main, development]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: xaicore_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d xaicore_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/xaicore_ci
      DATABASE_INTEGRATION: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run db:generate
      - run: npm run db:validate
      - run: npm run db:migrate:deploy
      - run: npm run type-check
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npm audit --audit-level=high

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
